<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GPU Price Aggregator - Bangladesh</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="topbar">
  <div class="container">
    <a href="/" class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      GPUPrice<span>.bd</span>
    </a>
    <div class="topbar-right">
      <span class="count" id="productCount">Loading...</span>
    </div>
  </div>
</div>

<div class="container main-layout">
  <aside class="sidebar" id="sidebar">
    <div class="filter-section">
      <h3>Filters</h3>
      <button class="clear-btn" onclick="clearFilters()">Clear All</button>
    </div>

    <div class="filter-group">
      <label>Search</label>
      <input type="text" id="filterSearch" placeholder="Search GPUs..." oninput="debounceFilter()">
    </div>

    <div class="filter-group">
      <label>Seller</label>
      <select id="filterSeller" onchange="applyFilters()">
        <option value="">All Sellers</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Brand</label>
      <select id="filterBrand" onchange="applyFilters()">
        <option value="">All Brands</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Chipset</label>
      <select id="filterChipset" onchange="applyFilters()">
        <option value="">All Chipsets</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Memory</label>
      <select id="filterMemory" onchange="applyFilters()">
        <option value="">All</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Memory Type</label>
      <select id="filterMemType" onchange="applyFilters()">
        <option value="">All</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Price Range (BDT)</label>
      <div class="price-range">
        <input type="number" id="filterMinPrice" placeholder="Min" onchange="applyFilters()">
        <span>—</span>
        <input type="number" id="filterMaxPrice" placeholder="Max" onchange="applyFilters()">
      </div>
    </div>

    <div class="filter-group">
      <label class="checkbox-label">
        <input type="checkbox" id="filterInStock" onchange="applyFilters()">
        In Stock Only
      </label>
    </div>
  </aside>

  <main class="content">
    <div class="toolbar">
      <div class="toolbar-left">
        <span class="result-count" id="resultCount">0 <small>Models</small></span>
      </div>
      <div class="toolbar-right">
        <select id="sortSelect" onchange="applyFilters()">
          <option value="name">Name &uarr;</option>
          <option value="name_desc">Name &darr;</option>
          <option value="price">Price &uarr;</option>
          <option value="price_desc">Price &darr;</option>
          <option value="brand">Brand &uarr;</option>
          <option value="chipset">Chipset &uarr;</option>
          <option value="seller_count">Sellers &uarr;</option>
          <option value="seller_count_desc">Sellers &darr;</option>
        </select>
      </div>
    </div>

    <div class="product-grid" id="productGrid">
      <div class="empty-state"><h3>Loading GPUs...</h3></div>
    </div>

    <div class="pagination" id="pagination"></div>
  </main>
</div>

<script>
let currentData = { products: [], total: 0, page: 1, total_pages: 1 };
let filters = {};
let debounceTimer = null;

function debounceFilter() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(applyFilters, 300);
}

function formatPrice(n) {
  return "\u09f3" + Number(n).toLocaleString("en-BD");
}

function escapeHtml(text) {
  const d = document.createElement("div");
  d.textContent = text;
  return d.innerHTML;
}

const SELLER_COLORS = {
  techlandbd: "seller-techlandbd",
  startech: "seller-startech",
  potakait: "seller-potakait",
  ultratech: "seller-ultratech",
  ucc: "seller-ucc",
  creatus: "seller-creatus",
  bengalpc: "seller-bengalpc",
  pcbstore: "seller-pcbstore",
};

function renderProducts(data) {
  currentData = data;
  const grid = document.getElementById("productGrid");
  document.getElementById("resultCount").innerHTML = data.total + ' <small>Models</small>';
  document.getElementById("productCount").textContent = data.total + " GPU models across Bangladesh";

  if (!data.products.length) {
    grid.innerHTML = '<div class="empty-state"><h3>No GPUs Found</h3><p>Try adjusting your filters to see more results.</p></div>';
    return;
  }

  grid.innerHTML = data.products.map(g => {
    const sellerChips = g.sellers.map(s => {
      const cls = SELLER_COLORS[s.seller_slug] || "seller-techlandbd";
      return `<a href="/product/${s.product_id}" class="seller-chip ${cls}" title="${escapeHtml(s.name)}">${escapeHtml(s.seller)} <span class="chip-price">${formatPrice(s.price)}</span></a>`;
    }).join("");

    return `<div class="model-card">
      <div class="mc-img">
        <a href="/model/${encodeURIComponent(g.slug)}">
          <img src="${escapeHtml(g.image_url || '')}" alt="" loading="lazy" onerror="this.src='/static/no-image.png'">
        </a>
      </div>
      <div class="mc-body">
        <a href="/model/${encodeURIComponent(g.slug)}" class="mc-name">${escapeHtml(g.name)}</a>
        <div class="mc-meta">
          ${g.brand ? `<span class="mc-spec">${escapeHtml(g.brand)}</span>` : ''}
          ${g.chipset ? `<span class="mc-chipset">${escapeHtml(g.chipset)}</span>` : ''}
          ${g.memory ? `<span class="mc-memory">${escapeHtml(g.memory)} ${escapeHtml(g.memory_type || '')}</span>` : ''}
        </div>
        <div class="mc-sellers">
          ${sellerChips}
        </div>
      </div>
      <div class="mc-aside">
        <div class="mc-price-col">
          <span class="mc-from">From</span>
          <span class="mc-price">${formatPrice(g.min_price)}</span>
          <span class="mc-count">${g.sellers.length} seller${g.sellers.length > 1 ? 's' : ''}</span>
        </div>
        <div class="mc-stock-row">
          ${g.sellers.some(s => s.in_stock)
            ? '<span class="stock-in">In Stock</span>'
            : '<span class="stock-out">Out of Stock</span>'}
        </div>
      </div>
    </div>`;
  }).join("");
}

function renderPagination(data) {
  const nav = document.getElementById("pagination");
  if (data.total_pages <= 1) { nav.innerHTML = ""; return; }

  let html = '<div class="page-nav">';
  if (data.page > 1) html += `<button onclick="goToPage(${data.page - 1})">Previous</button>`;

  for (let i = 1; i <= data.total_pages; i++) {
    if (i === 1 || i === data.total_pages || Math.abs(i - data.page) <= 2) {
      const isActive = i === data.page;
      html += `<button class="${isActive ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
    } else if (html[html.length - 1] !== ".") {
      html += `<span class="dots">...</span>`;
    }
  }

  if (data.page < data.total_pages) html += `<button onclick="goToPage(${data.page + 1})">Next</button>`;
  html += '</div>';
  nav.innerHTML = html;
}

function goToPage(page) {
  filters.page = page;
  fetchProducts();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function applyFilters() {
  filters = {
    search: document.getElementById("filterSearch").value,
    seller: document.getElementById("filterSeller").value,
    brand: document.getElementById("filterBrand").value,
    chipset: document.getElementById("filterChipset").value,
    memory: document.getElementById("filterMemory").value,
    memory_type: document.getElementById("filterMemType").value,
    min_price: document.getElementById("filterMinPrice").value,
    max_price: document.getElementById("filterMaxPrice").value,
    in_stock: document.getElementById("filterInStock").checked,
    sort: document.getElementById("sortSelect").value,
    page: 1,
  };
  fetchProducts();
}

function clearFilters() {
  document.getElementById("filterSearch").value = "";
  document.getElementById("filterSeller").value = "";
  document.getElementById("filterBrand").value = "";
  document.getElementById("filterChipset").value = "";
  document.getElementById("filterMemory").value = "";
  document.getElementById("filterMemType").value = "";
  document.getElementById("filterMinPrice").value = "";
  document.getElementById("filterMaxPrice").value = "";
  document.getElementById("filterInStock").checked = false;
  document.getElementById("sortSelect").value = "name";
  applyFilters();
}

function populateSelect(id, items) {
  const sel = document.getElementById(id);
  const current = sel.value;
  sel.innerHTML = '<option value="">' + sel.options[0].text + '</option>';
  items.forEach(item => {
    const opt = document.createElement("option");
    if (typeof item === "object") {
      opt.value = item.slug;
      opt.textContent = item.name;
    } else {
      opt.value = item;
      opt.textContent = item;
    }
    if (opt.value === current) opt.selected = true;
    sel.appendChild(opt);
  });
}

async function fetchProducts() {
  const params = new URLSearchParams();
  if (filters.search) params.set("search", filters.search);
  if (filters.seller) params.set("seller", filters.seller);
  if (filters.brand) params.set("brand", filters.brand);
  if (filters.chipset) params.set("chipset", filters.chipset);
  if (filters.memory) params.set("memory", filters.memory);
  if (filters.memory_type) params.set("memory_type", filters.memory_type);
  if (filters.min_price) params.set("min_price", filters.min_price);
  if (filters.max_price) params.set("max_price", filters.max_price);
  if (filters.in_stock) params.set("in_stock", "1");

  if (filters.sort) {
    const isDesc = filters.sort.includes("_desc");
    const field = isDesc ? filters.sort.replace("_desc","") : filters.sort;
    params.set("sort", field);
    params.set("order", isDesc ? "desc" : "asc");
  }
  params.set("page", filters.page || 1);
  params.set("per_page", 50);

  try {
    const resp = await fetch("/api/products?" + params.toString());
    const data = await resp.json();
    if (data.filters) {
      if (!filters.seller) populateSelect("filterSeller", data.filters.sellers || []);
      if (!filters.brand) populateSelect("filterBrand", data.filters.brands);
      if (!filters.chipset) populateSelect("filterChipset", data.filters.chipsets);
      if (!filters.memory) populateSelect("filterMemory", data.filters.memories);
      if (!filters.memory_type) populateSelect("filterMemType", data.filters.memory_types);
    }
    renderProducts(data);
    renderPagination(data);
  } catch (e) {
    console.error("Fetch error:", e);
    document.getElementById("productGrid").innerHTML = '<div class="error">Failed to load products. Is the server running?</div>';
  }
}

filters = { page: 1, sort: "name" };
fetchProducts();
</script>
</body>
</html>
